<?xml version="1.0" encoding="UTF-8"?>
<!--
  Boloka favicon: the mark alone — three stacked stones, largest at the
  base — already solid fills rather than thin strokes, so the silhouette
  holds up unmodified at 16px. The base and middle stones follow the
  browser/OS scheme so the tab icon holds up on light and dark chrome;
  the signal-lime capstone is constant.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Boloka">
  <title>Boloka</title>
  <style>
    .structure { fill: #10140F; }
    @media (prefers-color-scheme: dark) {
      .structure { fill: #E9F0EA; }
    }
  </style>
  <path class="structure" d="M40,187 C40,159 82,143 128,143 C174,143 216,159 216,187 C216,213 174,227 128,227 C82,227 40,213 40,187 Z" />
  <path class="structure" d="M66,124 C66,101 98,86 132,86 C166,86 194,101 194,124 C194,145 166,159 132,159 C98,159 66,145 66,124 Z" />
  <path fill="#A8E01F" d="M90,68 C90,49 110,37 132,37 C154,37 172,49 172,68 C172,85 154,97 132,97 C110,97 90,85 90,68 Z" />
</svg>
