<?xml version="1.0" encoding="UTF-8"?>
<!--
  Boloka lockup — dark-background variant.

  Mark: a cairn — three stacked stones, largest at the base, smallest on
  top. "Kept, not merely stored." Wordmark: "boloka" hand-plotted as
  stroked paths on a shared grid (baseline 180, x-height 100, ascender
  30, stroke 22, round caps). There is no <text> and no font-family
  anywhere in this file, so the lockup renders identically everywhere
  with nothing to load. The four round letters (b, o, o, a) all reuse the
  same bowl curve, the way a real typeface would.

  Colors: paper #E9F0EA for structure, signal lime #A8E01F for the
  capstone — on carbon the bright end of the signal ramp is used at full
  strength (12.5:1 on #0A0C0B).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 256" role="img" aria-label="Boloka">
  <title>Boloka</title>

  <!-- ============ mark: a cairn ============ -->
  <g fill="#E9F0EA">
    <path d="M46,183 C46,159 83,145 128,145 C173,145 210,159 210,183 C210,206 173,219 128,219 C83,219 46,206 46,183 Z" />
    <path d="M70,126 C70,105 100,92 132,92 C164,92 190,105 190,126 C190,145 164,157 132,157 C100,157 70,145 70,126 Z" />
  </g>
  <path fill="#A8E01F" d="M92,72 C92,55 110,44 132,44 C154,44 170,55 170,72 C170,87 154,97 132,97 C110,97 92,87 92,72 Z" />

  <!-- ============ wordmark ============ -->
  <g transform="translate(300,23)" fill="none" stroke="#E9F0EA" stroke-width="22"
     stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(0,0)"><!-- b -->
      <path d="M80,140 C80,118 62,100 40,100 C18,100 0,118 0,140 C0,162 18,180 40,180 C62,180 80,162 80,140" />
      <path d="M0,30 L0,180" />
    </g>
    <g transform="translate(100,0)"><!-- o -->
      <path d="M80,140 C80,118 62,100 40,100 C18,100 0,118 0,140 C0,162 18,180 40,180 C62,180 80,162 80,140" />
    </g>
    <g transform="translate(200,0)"><!-- l -->
      <path d="M11,30 L11,180" />
    </g>
    <g transform="translate(260,0)"><!-- o -->
      <path d="M80,140 C80,118 62,100 40,100 C18,100 0,118 0,140 C0,162 18,180 40,180 C62,180 80,162 80,140" />
    </g>
    <g transform="translate(360,0)"><!-- k -->
      <path d="M0,30 L0,180" />
      <path d="M0,135 L58,98" />
      <path d="M0,135 L58,180" />
    </g>
    <g transform="translate(460,0)"><!-- a -->
      <path d="M80,140 C80,118 62,100 40,100 C18,100 0,118 0,140 C0,162 18,180 40,180 C62,180 80,162 80,140" />
      <path d="M80,100 L80,180" />
    </g>
  </g>
</svg>
